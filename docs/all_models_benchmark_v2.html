
<div style="padding: 1rem 0 1.5rem;">

<div style="display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 1.5rem; align-items: center;">
  <span style="font-size: 12px; color: var(--color-text-secondary); margin-right: 2px;">Toggle:</span>
  <button class="tog active" data-i="0" style="font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 1.5px solid #7F77DD; background: #7F77DD; color: #fff; cursor: pointer;">Super-120B JANG 4M</button>
  <button class="tog active" data-i="1" style="font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 1.5px solid #1D9E75; background: #1D9E75; color: #fff; cursor: pointer;">Cascade-30B JANG 4M</button>
  <button class="tog active" data-i="2" style="font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 1.5px solid #D85A30; background: #D85A30; color: #fff; cursor: pointer;">Cascade-30B oQ4</button>
  <button class="tog active" data-i="3" style="font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 1.5px solid #378ADD; background: #378ADD; color: #fff; cursor: pointer;">Nano-30B MLX-8bit</button>
  <button class="tog active" data-i="4" style="font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 1.5px solid #639922; background: #639922; color: #fff; cursor: pointer;">Qwen3-Coder-Next MLX-8bit</button>
  <button class="tog active" data-i="5" style="font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 1.5px solid #534AB7; background: #534AB7; color: #fff; cursor: pointer;">Qwen3.5-35B bf16</button>
  <button class="tog active" data-i="6" style="font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 1.5px solid #0F6E56; background: #0F6E56; color: #fff; cursor: pointer;">Qwen3.5-35B oQ4</button>
  <button class="tog active" data-i="7" style="font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 1.5px solid #993C1D; background: #993C1D; color: #fff; cursor: pointer;">Qwen3.5-35B JANG 4K</button>
  <button class="tog active" data-i="8" style="font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 1.5px solid #854F0B; background: #854F0B; color: #fff; cursor: pointer;">Qwen3.5-35B 4bit</button>
</div>

<div style="position: relative; width: 100%; height: 420px;">
  <canvas id="benchChart"></canvas>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const colors = ['#7F77DD','#1D9E75','#D85A30','#378ADD','#639922','#534AB7','#0F6E56','#993C1D','#854F0B'];
const labels = ['HumanEval','LiveCodeBench','MBPP','MMLU','TruthfulQA'];
const rawData = [
  [0.9024, 0.26,  0.85,  0.785, 0.8274],
  [0.7988, 0.28,  0.67,  0.678, 0.7173],
  [0.3902, 0.16,  0.54,  0.475, 0.5545],
  [0.5366, 0.12,  0.565, 0.474, 0.6034],
  [0.8963, 0.36,  0.815, 0.834, 0.869 ],
  [0.2988, 0.41,  0.75,  0.227, 0.2497],
  [0.372,  0.19,  0.305, 0.245, 0.2509],
  [0.5610, 0.18,  0.335, 0.238, 0.2521],
  [0.3415, 0.14,  0.24,  0.247, 0.2142]
];
const modelNames = [
  'Super-120B JANG 4M','Cascade-30B JANG 4M','Cascade-30B oQ4','Nano-30B MLX-8bit',
  'Qwen3-Coder-Next MLX-8bit','Qwen3.5-35B bf16','Qwen3.5-35B oQ4',
  'Qwen3.5-35B JANG 4K','Qwen3.5-35B 4bit'
];

const datasets = rawData.map((data, i) => ({
  label: modelNames[i],
  data: data.map(v => +(v * 100).toFixed(1)),
  backgroundColor: colors[i] + 'cc',
  borderColor: colors[i],
  borderWidth: 1.5,
  borderRadius: 3
}));

const ctx = document.getElementById('benchChart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'bar',
  data: { labels, datasets },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}%`
        }
      }
    },
    scales: {
      x: {
        grid: { color: 'rgba(128,128,128,0.1)' },
        ticks: { color: '#888', font: { size: 12 } }
      },
      y: {
        min: 0, max: 100,
        grid: { color: 'rgba(128,128,128,0.1)' },
        ticks: {
          color: '#888',
          font: { size: 12 },
          callback: v => v + '%'
        },
        title: { display: true, text: 'Score (%)', color: '#888', font: { size: 12 } }
      }
    }
  }
});

document.querySelectorAll('.tog').forEach(btn => {
  btn.addEventListener('click', () => {
    const i = +btn.dataset.i;
    const ds = chart.data.datasets[i];
    const isActive = btn.classList.contains('active');
    if (isActive) {
      btn.classList.remove('active');
      btn.style.background = 'transparent';
      btn.style.color = colors[i];
      ds.hidden = true;
    } else {
      btn.classList.add('active');
      btn.style.background = colors[i];
      btn.style.color = '#fff';
      ds.hidden = false;
    }
    chart.update();
  });
});
</script>
